name: Selenium Test Execution

on:
  push:
    branches: [ "main", "test", "yogi" ]
  pull_request:
    branches: [ "main", "test", "yogi" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Set up JDK
        uses: actions/setup-java@v4 # Updated to v4
        with:
          java-version: '19'
          distribution: 'temurin'
          cache: 'maven' # Caching dependencies makes runs faster

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Tests with Virtual Display
        # xvfb-run creates a virtual monitor (1280x1024)
        run: xvfb-run --server-args="-screen 0 1280x1024x24" mvn test

      - name: Upload Execution Artifacts
        if: always() # Ensures videos/screenshots are uploaded even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: execution-reports
          # This captures the recordings folder and the screenshots folder if they exist
          path: |
            recordings/
            screenshots/
          if-no-files-found: warn